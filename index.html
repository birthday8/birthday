<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vidhya</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-bg-1:#ffe1ec;
    --pink-bg-2:#ffc6d9;
    --rose:#ff5e8e;
    --rose-deep:#e0356e;
    --plum:#5c2340;
    --gold:#ffd166;
    --white:#fff9fb;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    overflow:hidden;
    font-family:'Quicksand',sans-serif;
    background:linear-gradient(160deg,var(--pink-bg-1),var(--pink-bg-2) 60%,#ffb3ce);
  }
  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* floating 3D hearts */
  .heart{
    position:absolute;
    bottom:-10vh;
    font-size:2rem;
    filter: drop-shadow(0 6px 6px rgba(224,53,110,0.35)) drop-shadow(0 1px 0 rgba(255,255,255,0.6));
    animation: rise linear infinite, sway ease-in-out infinite;
    opacity:0.85;
    will-change: transform;
    user-select:none;
    pointer-events:none;
  }
  @keyframes rise{
    from{ transform: translateY(0) rotate(0deg); }
    to{ transform: translateY(-120vh) rotate(15deg); }
  }
  @keyframes sway{
    0%,100%{ margin-left:0px; }
    50%{ margin-left:40px; }
  }

  /* center card */
  .card{
    position:relative;
    z-index:5;
    text-align:center;
    padding:3rem 2.5rem;
    max-width:560px;
  }

  .balloon-heart{
    font-size:5.5rem;
    display:inline-block;
    filter: drop-shadow(0 14px 18px rgba(224,53,110,0.45)) drop-shadow(0 2px 0 rgba(255,255,255,0.7));
    animation: pulse 1.8s ease-in-out infinite, floaty 4s ease-in-out infinite;
    cursor:pointer;
  }
  @keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.12); }
  }
  @keyframes floaty{
    0%,100%{ transform: translateY(0) rotate(-3deg); }
    50%{ transform: translateY(-14px) rotate(3deg); }
  }

  h1{
    font-family:'Pacifico',cursive;
    font-weight:400;
    color:var(--rose-deep);
    font-size:clamp(2.2rem, 6vw, 3.4rem);
    margin-top:0.6rem;
    text-shadow: 0 3px 0 rgba(255,255,255,0.6), 0 8px 14px rgba(224,53,110,0.25);
  }

  .name{
    color:var(--plum);
  }

  p.tagline{
    margin-top:0.7rem;
    color:var(--plum);
    font-weight:700;
    font-size:1.05rem;
    letter-spacing:0.02em;
    opacity:0.85;
  }

  .mini-hearts{
    margin-top:1.6rem;
    font-size:1.4rem;
    letter-spacing:0.5rem;
  }
  .mini-hearts span{
    display:inline-block;
    animation: bob 1.6s ease-in-out infinite;
    filter: drop-shadow(0 4px 4px rgba(224,53,110,0.3));
  }
  .mini-hearts span:nth-child(2){ animation-delay:0.2s; }
  .mini-hearts span:nth-child(3){ animation-delay:0.4s; }
  .mini-hearts span:nth-child(4){ animation-delay:0.6s; }
  .mini-hearts span:nth-child(5){ animation-delay:0.8s; }
  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-10px); }
  }

  .burst{
    position:fixed;
    font-size:1.6rem;
    pointer-events:none;
    z-index:20;
    animation: burstUp 1.1s ease-out forwards;
  }
  @keyframes burstUp{
    0%{ opacity:1; transform: translateY(0) scale(0.6); }
    100%{ opacity:0; transform: translateY(-140px) scale(1.3); }
  }

  @media (prefers-reduced-motion: reduce){
    .heart, .balloon-heart, .mini-hearts span{ animation: none !important; }
  }

  /* intro / landing screen */
  #intro{
    position:fixed;
    inset:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:linear-gradient(160deg,var(--pink-bg-1),var(--pink-bg-2) 60%,#ffb3ce);
    transition: opacity 0.7s ease, visibility 0.7s ease;
  }
  #intro.hidden{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .intro-heart{
    font-size:3.5rem;
    filter: drop-shadow(0 10px 14px rgba(224,53,110,0.4));
    animation: floaty 3s ease-in-out infinite;
    margin-bottom:1.2rem;
  }
  .intro-title{
    font-family:'Pacifico',cursive;
    color:var(--rose-deep);
    font-size:clamp(1.6rem, 5vw, 2.2rem);
    margin-bottom:1.6rem;
    text-align:center;
    padding:0 1rem;
  }
  #openBtn{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:1.05rem;
    color:var(--white);
    background:linear-gradient(135deg,var(--rose),var(--rose-deep));
    border:none;
    padding:0.9rem 2.2rem;
    border-radius:999px;
    cursor:pointer;
    box-shadow: 0 8px 18px rgba(224,53,110,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  #openBtn:hover{
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 22px rgba(224,53,110,0.5);
  }
  #openBtn:active{
    transform: translateY(0) scale(0.98);
  }

  .stage{ visibility:hidden; }
  .stage.revealed{ visibility:visible; }
</style>
</head>
<body>

<div id="intro">
  <div class="intro-heart">💗</div>
  <div class="intro-title">A little something for Vidhya</div>
  <button id="openBtn">Open your card 💌</button>
</div>

<div class="stage" id="stage">
  <div class="card">
    <div class="balloon-heart" id="mainHeart">💖</div>
    <h1>Happy Birthday<br><span class="name">Vidhya</span></h1>
    <p class="tagline">wishing you a day as sweet as you are</p>
    <div class="mini-hearts">
      <span>💕</span><span>💗</span><span>💓</span><span>💞</span><span>💘</span>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const intro = document.getElementById('intro');
  const openBtn = document.getElementById('openBtn');
  const heartEmojis = ['💖','💗','💓','💕','💞','❤️','💘'];
  let started = false;

  function spawnHeart(){
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    const left = Math.random()*100;
    const size = 1.2 + Math.random()*2.2;
    const duration = 7 + Math.random()*8;
    const swayDur = 2 + Math.random()*2;
    h.style.left = left+'vw';
    h.style.fontSize = size+'rem';
    h.style.animationDuration = duration+'s, '+swayDur+'s';
    stage.appendChild(h);
    setTimeout(()=> h.remove(), duration*1000);
  }

  openBtn.addEventListener('click', ()=>{
    intro.classList.add('hidden');
    stage.classList.add('revealed');
    if(!started){
      started = true;
      for(let i=0;i<18;i++){
        setTimeout(spawnHeart, i*300);
      }
      setInterval(spawnHeart, 500);
    }
  });

  // click burst on the big heart
  const mainHeart = document.getElementById('mainHeart');
  mainHeart.addEventListener('click', (e)=>{
    for(let i=0;i<10;i++){
      const b = document.createElement('div');
      b.className='burst';
      b.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
      b.style.left = (e.clientX + (Math.random()*80-40)) + 'px';
      b.style.top = (e.clientY + (Math.random()*20-10)) + 'px';
      document.body.appendChild(b);
      setTimeout(()=> b.remove(), 1200);
    }
  });
</script>

</body>
</html>
